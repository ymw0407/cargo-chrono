name: Task
description: Define a discrete unit of implementation work.
title: "[Task] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for concrete work items that follow from an already-agreed
        design. For exploratory ideas, file a Feature Request instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be implemented or changed.
    validations:
      required: true

  - type: dropdown
    id: owning-role
    attributes:
      label: Owning role
      description: |
        Which role's modules does this task touch?
        See [ROLE_OWNERSHIP](https://github.com/ymw0407/cargo-chronoscope/blob/main/docs/internal/ROLE_OWNERSHIP.md).
      options:
        - Integrator
        - Data
        - Realtime
        - Cross-role (specify in description)
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List of conditions that must be true for this task to be considered done.
      value: |
        - [ ]
        - [ ] Unit tests added
        - [ ] `cargo clippy --all-targets -- -D warnings` passes
        - [ ] `cargo test` passes
    validations:
      required: true

  - type: input
    id: dependencies
    attributes:
      label: Dependencies
      description: If this task is blocked by another issue, link it as `#N`.
      placeholder: "#42, #43"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Design documents, code locations, external references, etc.
    validations:
      required: false
