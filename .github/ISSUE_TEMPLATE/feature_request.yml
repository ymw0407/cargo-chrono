name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For anything beyond a small tweak, please open this issue **before**
        starting work on a PR so we can agree on the approach.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two lines describing the feature you want.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed-implementation
    attributes:
      label: Proposed implementation
      description: If you have an idea for how to build it, sketch it here. Optional.
    validations:
      required: false

  - type: checkboxes
    id: affected-modules
    attributes:
      label: Affected modules
      description: Tick every module you expect this feature to touch.
      options:
        - label: "`model/`"
        - label: "`cli/`"
        - label: "`supervisor/`"
        - label: "`parser/`"
        - label: "`persist/`"
        - label: "`diff/`"
        - label: "`broker/`"
        - label: "`anomaly/`"
        - label: "`tui/`"
        - label: "`main.rs`"
        - label: "docs / CI / config"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.
    validations:
      required: false
